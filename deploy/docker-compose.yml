services:
  web:
    build:
      # 这里假设前端代码在服务器上与后端同级目录：../private_chef_client
      # 如你的服务器目录不同，把 context 改成前端项目所在路径即可
      context: ../private_chef_client
      dockerfile: deploy/nginx/Dockerfile
    ports:
      # 避免与服务器上已有项目冲突，默认暴露到 8080
      - "8080:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    env_file:
      - .env.prod
    expose:
      - "8000"

